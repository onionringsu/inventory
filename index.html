<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inventory Dashboard</title>
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>

<body>

<!-- Loading Screen -->
<div id="loadingScreen" class="loading-screen">
  <h1 class="loading-title">Inventory Dashboard</h1>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <p id="progressText">0%</p>
</div>


<!-- LOGIN / REGISTER -->
<div id="auth" class="auth-wrapper hidden">

  <form id="authForm" class="auth-card">

    <h2 id="authTitle">Login</h2>

    <input id="username" type="text" placeholder="Username" required>

    <input id="password" type="password" placeholder="Password" required>

    <button type="submit" id="authBtn">Login</button>

    <p id="switchMode" class="switch">
      Don't have an account? Create one
    </p>

    <p id="msg" class="msg"></p>

  </form>

</div>


<!-- MAIN DASHBOARD -->
<div id="dashboard" class="container hidden">

  <!-- SIDEBAR -->
  <aside id="sidebar" class="sidebar">

    <div class="sidebar-top">

      <h3 class="logo">Inventory</h3>

      <button id="toggleSidebar" class="toggle-btn">
        ☰
      </button>

    </div>


    <nav class="menu">

      <button class="menu-btn active" id="dashBtn" title="Dashboard">
        <span class="icon">🍞</span>
        <span class="text">Dashboard</span>
      </button>

      <button class="menu-btn" id="accountsBtn" title="Accounts">
        <span class="icon">🧾</span>
        <span class="text">Accounts</span>
      </button>

      <button class="menu-btn" id="historyBtn" title="History">
        <span class="icon">📜</span>
        <span class="text">History</span>
      </button>

      <button class="menu-btn" id="salesBtn" title="Sales">
        <span class="icon">🛒</span>
        <span class="text">Sales</span>
      </button>

      <button class="menu-btn" id="settingsBtn" title="Settings">
        <span class="icon">⚙️</span>
        <span class="text">Settings</span>
      </button>

    </nav>


    <div class="logout-wrapper">

      <button class="menu-btn logout-btn" id="logoutBtn" title="Logout">
        <span class="icon">☕</span>
        <span class="text">Logout</span>
      </button>

    </div>

  </aside>


  <!-- CONTENT -->
  <main class="content">

    <!-- DASHBOARD -->
    <section id="dash">

      <h2 id="welcome"></h2>

      <div class="inventory-card">

        <div class="add-product-row">

          <input
            type="text"
            id="productName"
            placeholder="Item Name"
          >

          <input
            type="number"
            id="productQty"
            placeholder="Stock Quantity"
          >

          <button id="addProductBtn">
            Add Item
          </button>

        </div>


        <input
          type="text"
          id="searchProduct"
          placeholder="Search item..."
          style="margin-top:10px;padding:6px;width:100%;"
        >

        <div
          id="inventorySummary"
          style="margin-top:15px;font-weight:600;"
        ></div>

        <table id="inventoryTable"></table>

      </div>

    </section>


    <!-- ACCOUNTS -->
    <section id="accounts" class="hidden">

      <h2>Staff Accounts</h2>

      <table id="userTable"></table>

    </section>


    <!-- SETTINGS -->
    <section id="settings" class="hidden">

      <h2>Display Settings</h2>

      <div class="theme-card">

        <button id="lightTheme">
          Light Theme
        </button>

        <button id="darkTheme">
          Dark Theme
        </button>

      </div>

    </section>


    <!-- HISTORY -->
    <section id="history" class="hidden">

      <h2>Activity Log</h2>

      <input
        type="text"
        id="historySearch"
        placeholder="Search activity..."
        style="margin:10px 0;padding:6px;width:100%;"
      >


      <div class="history-filters">

        <label for="historyDate">Filter by Date:</label>

        <input type="date" id="historyDate">


        <label for="historyType">Filter by Action:</label>

        <select id="historyType">

          <option value="all">All</option>
          <option value="Stock In">Stock In</option>
          <option value="Stock Out">Stock Out</option>
          <option value="Product Update">Product Update</option>
          <option value="User Update">User Update</option>
          <option value="User Delete">User Delete</option>
          <option value="Product Removed">Product Removed</option>

        </select>

      </div>


      <button id="clearHistoryBtn" class="clear-btn">
        Clear History
      </button>


      <table id="historyTable">

        <thead>

          <tr>
            <th>Timestamp</th>
            <th>Action</th>
            <th>Details</th>
          </tr>

        </thead>

        <tbody></tbody>

      </table>

    </section>


    <!-- SALES -->
    <section id="sales" class="hidden">

      <h2>Sales Summary</h2>

      <div class="sale-options">

        <label for="viewType">View Type:</label>

        <select id="viewType">

          <option value="best">Best Selling</option>
          <option value="least">Lowest Selling</option>

        </select>


        <label for="startDate">Start Date:</label>

        <input type="date" id="startDate">


        <label for="endDate">End Date:</label>

        <input type="date" id="endDate">


        <button id="applyFilter">
          Apply
        </button>

        <button id="clearSales" class="clear-btn">
          Clear All Sales
        </button>

      </div>


      <table id="saleTable">

        <thead>

          <tr>
            <th>Product</th>
            <th>Quantity Sold</th>
            <th>Last Sold Date</th>
          </tr>

        </thead>

        <tbody></tbody>

      </table>

    </section>

  </main>

</div>


<!-- Notification -->
<div id="notification" class="notification">
  Action successful!
</div>


<script src="script.js" defer></script>

</body>
</html>
